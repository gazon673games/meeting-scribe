name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Build executable
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: .\scripts\build_exe.ps1 -Version $env:RELEASE_VERSION

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meeting-scribe-windows
          path: dist/meeting-scribe-*-win64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $asset = Get-ChildItem -LiteralPath dist -Filter "meeting-scribe-*-win64.zip" | Select-Object -First 1
          if ($null -eq $asset) {
            throw "Release asset zip was not found."
          }
          if (gh release view $env:RELEASE_TAG 2>$null) {
            gh release upload $env:RELEASE_TAG $asset.FullName --clobber
          } else {
            gh release create $env:RELEASE_TAG $asset.FullName --title $env:RELEASE_TAG --generate-notes
          }
