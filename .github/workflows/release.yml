name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows-x64
            artifact_name: meeting-scribe-windows-x64
            python_arch: x64
            allow_failure: false
          - os: windows-11-arm
            artifact_suffix: windows-arm64
            artifact_name: meeting-scribe-windows-arm64
            python_arch: arm64
            allow_failure: true
          - os: ubuntu-24.04
            artifact_suffix: linux-x64
            artifact_name: meeting-scribe-linux-x64
            python_arch: x64
            allow_failure: false
          - os: ubuntu-24.04-arm
            artifact_suffix: linux-arm64
            artifact_name: meeting-scribe-linux-arm64
            python_arch: arm64
            allow_failure: false
          - os: macos-15-intel
            artifact_suffix: macos-x64
            artifact_name: meeting-scribe-macos-x64
            python_arch: x64
            allow_failure: false
          - os: macos-14
            artifact_suffix: macos-arm64
            artifact_name: meeting-scribe-macos-arm64
            python_arch: arm64
            allow_failure: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libportaudio2 \
            libpulse0 \
            libtiff6 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-util1 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.python_arch }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build executable
        run: python scripts/build_release.py --version "${{ github.ref_name }}" --artifact-suffix "${{ matrix.artifact_suffix }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/meeting-scribe-*.zip

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ls -la release-assets
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/*.zip --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --generate-notes
          fi
